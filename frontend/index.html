    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Public Sans"', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', '"Helvetica Neue"', 'Arial', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Public Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            letter-spacing: -0.01em;
        }
        .osca-blue { background-color: #1e3a8a; }
        .osca-gold { background-color: #eab308; }
        
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        /* ---- Smooth View Transitions ---- */
        .view-enter {
            animation: viewFadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes viewFadeIn {
            from { opacity: 0; transform: translateY(8px) scale(0.99); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Staggered children fade-in */
        .stagger-in > * {
            animation: staggerChild 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .stagger-in > *:nth-child(1) { animation-delay: 0ms; }
        .stagger-in > *:nth-child(2) { animation-delay: 40ms; }
        .stagger-in > *:nth-child(3) { animation-delay: 80ms; }
        .stagger-in > *:nth-child(4) { animation-delay: 120ms; }
        .stagger-in > *:nth-child(5) { animation-delay: 160ms; }
        .stagger-in > *:nth-child(6) { animation-delay: 200ms; }
        .stagger-in > *:nth-child(7) { animation-delay: 240ms; }
        .stagger-in > *:nth-child(8) { animation-delay: 280ms; }
        @keyframes staggerChild {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Fast content swap */
        .content-ready {
            animation: contentReady 0.2s ease-out both;
        }
        @keyframes contentReady {
            from { opacity: 0.6; }
            to   { opacity: 1; }
        }

        /* Smooth main scroll */
        main {
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        /* GPU acceleration for common animated elements */
        .shadow-sm, .rounded-3xl, .rounded-\\[2\\.5rem\\] {
            will-change: auto;
        }

        /* Standardized Government Form Elements */
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #0038A8 !important;
            box-shadow: 0 0 0 4px rgba(0, 56, 168, 0.1) !important;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        button:active {
            transform: scale(0.97);
        }

        /* Improved Sidebar Transition */
        aside {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1) !important;
        }
    </style>
